<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="虹ケ丘学園 校内マップメーカー">

    <meta
        name="theme-color"
        content="#1f4fb2">

    <title>
        虹ケ丘学園 校内マップメーカー v1.0
    </title>

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="style.css">

    <!-- html2canvas -->
    <script
        src="lib/html2canvas.min.js">
    </script>
</head>

<body>

<div id="app">

    <!-- ========================= -->
    <!-- Header -->
    <!-- ========================= -->

    <header id="header">

        <div class="header-left">

            <img
                id="school-logo"
                src="assets/logo/logo.png"
                alt="虹ケ丘学園">

            <div class="title-area">

                <h1>
                    虹ケ丘学園
                </h1>

                <p>
                    Campus Map Builder
                </p>

            </div>

        </div>

        <div class="header-right">

            <button
                id="new-map"
                class="header-button">
                新規
            </button>

            <button
                id="save-map"
                class="header-button">
                保存
            </button>

            <button
                id="load-map"
                class="header-button">
                読込
            </button>

            <button
                id="export-png"
                class="header-button">
                PNG保存
            </button>

            <button
                id="open-settings"
                class="header-button">
                設定
            </button>

        </div>

    </header>

    <!-- ========================= -->
    <!-- Toolbar -->
    <!-- ========================= -->

    <nav id="toolbar">

        <button
            id="undo"
            class="tool-button">
            Undo
        </button>

        <button
            id="redo"
            class="tool-button">
            Redo
        </button>

        <div class="toolbar-divider"></div>

        <button
            id="copy"
            class="tool-button">
            コピー
        </button>

        <button
            id="paste"
            class="tool-button">
            貼り付け
        </button>

        <button
            id="delete"
            class="tool-button">
            削除
        </button>

        <div class="toolbar-divider"></div>

        <button
            id="zoom-out"
            class="tool-button">
            −
        </button>

        <span id="zoom-label">
            100%
        </span>

        <button
            id="zoom-in"
            class="tool-button">
            ＋
        </button>

        <div class="toolbar-divider"></div>

        <button
            id="toggle-grid"
            class="tool-button">
            グリッド
        </button>

        <button
            id="toggle-inside"
            class="tool-button">
            校舎内部編集
        </button>

    </nav>

    <!-- ========================= -->
    <!-- Main -->
    <!-- ========================= -->

    <main id="main-layout">

        <!-- ========================= -->
        <!-- Left Sidebar -->
        <!-- ========================= -->

        <aside id="sidebar-left">

            <div class="sidebar-tabs">

                <button
                    class="sidebar-tab active"
                    data-tab="building">
                    建物
                </button>

                <button
                    class="sidebar-tab"
                    data-tab="room">
                    教室
                </button>

                <button
                    class="sidebar-tab"
                    data-tab="furniture">
                    家具
                </button>

                <button
                    class="sidebar-tab"
                    data-tab="nature">
                    自然
                </button>

                <button
                    class="sidebar-tab"
                    data-tab="road">
                    道路
                </button>

                <button
                    class="sidebar-tab"
                    data-tab="favorite">
                    お気に入り
                </button>

            </div>

            <div id="sidebar-content">

                <div
                    class="tool-category"
                    id="building-list">

                    <!-- script.jsで生成 -->

                </div>

                <div
                    class="tool-category hidden"
                    id="room-list">

                </div>

                <div
                    class="tool-category hidden"
                    id="furniture-list">

                </div>

                <div
                    class="tool-category hidden"
                    id="nature-list">

                </div>

                <div
                    class="tool-category hidden"
                    id="road-list">

                </div>

                <div
                    class="tool-category hidden"
                    id="favorite-list">

                </div>

            </div>

        </aside>

        <!-- ========================= -->
        <!-- Canvas -->
        <!-- ========================= -->

        <section id="canvas-wrapper">

            <div id="canvas-scroll">

                <div id="canvas">

                    <div id="grid-layer"></div>

                    <div id="guide-layer"></div>

                    <div id="object-layer"></div>

                    <div id="selection-layer"></div>

                    <div id="preview-layer"></div>

                </div>

            </div>

        </section>

        <!-- ========================= -->
        <!-- Right Sidebar -->
        <!-- ========================= -->

        <aside id="sidebar-right">

            <!-- ===== レイヤー ===== -->

            <section class="panel">

                <div class="panel-header">

                    <h2>
                        レイヤー
                    </h2>

                    <div class="panel-actions">

                        <button id="layer-up">
                            ▲
                        </button>

                        <button id="layer-down">
                            ▼
                        </button>

                    </div>

                </div>

                <div
                    id="layer-list"
                    class="panel-body">

                    <!-- script.js -->

                </div>

            </section>

            <!-- ===== プロパティ ===== -->

            <section class="panel">

                <div class="panel-header">

                    <h2>

                        プロパティ

                    </h2>

                </div>

                <div
                    id="property-panel"
                    class="panel-body">

                    <div class="property-row">

                        <label>

                            名前

                        </label>

                        <input
                            id="property-name"
                            type="text">

                    </div>

                    <div class="property-row">

                        <label>

                            種類

                        </label>

                        <span
                            id="property-type">

                            -

                        </span>

                    </div>

                    <div class="property-row">

                        <label>

                            X

                        </label>

                        <input
                            id="property-x"
                            type="number">

                    </div>

                    <div class="property-row">

                        <label>

                            Y

                        </label>

                        <input
                            id="property-y"
                            type="number">

                    </div>

                    <div class="property-row">

                        <label>

                            幅

                        </label>

                        <input
                            id="property-width"
                            type="number">

                    </div>

                    <div class="property-row">

                        <label>

                            高さ

                        </label>

                        <input
                            id="property-height"
                            type="number">

                    </div>

                    <div class="property-row">

                        <label>

                            回転

                        </label>

                        <input
                            id="property-rotate"
                            type="number">

                    </div>

                    <div class="property-row">

                        <label>

                            透明度

                        </label>

                        <input
                            id="property-opacity"
                            type="range"
                            min="0"
                            max="100"
                            value="100">

                    </div>

                </div>

            </section>

            <!-- ===== 履歴 ===== -->

            <section class="panel">

                <div class="panel-header">

                    <h2>

                        履歴

                    </h2>

                </div>

                <div
                    id="history-panel"
                    class="panel-body">

                </div>

            </section>

        </aside>

    </main>

    <!-- ========================= -->
    <!-- Status Bar -->
    <!-- ========================= -->

    <footer id="statusbar">

        <div class="status-item">

            Zoom

            <span id="status-zoom">

                100%

            </span>

        </div>

        <div class="status-item">

            X :

            <span id="status-x">

                0

            </span>

        </div>

        <div class="status-item">

            Y :

            <span id="status-y">

                0

            </span>

        </div>

        <div class="status-item">

            選択 :

            <span id="status-selected">

                0

            </span>

        </div>

        <div class="status-item">

            保存 :

            <span id="status-save">

                保存済み

            </span>

        </div>

        <div class="status-item">

            Version 1.0

        </div>

    </footer>

    <!-- ========================= -->
    <!-- Toast -->
    <!-- ========================= -->

    <div id="toast-container">

    </div>

    <!-- ========================= -->
    <!-- Loading -->
    <!-- ========================= -->

    <div
        id="loading-screen"
        class="hidden">

        <div class="loading-window">

            <h2>

                Loading...

            </h2>

            <div class="loading-bar">

                <div
                    id="loading-progress">

                </div>

            </div>

        </div>

    </div>

    <!-- ========================= -->
    <!-- Setting Modal -->
    <!-- ========================= -->

    <dialog id="settings-dialog">

        <form method="dialog">

            <h2>

                設定

            </h2>

            <div class="setting-row">

                <label>

                    ダークモード

                </label>

                <input
                    id="darkmode"
                    type="checkbox">

            </div>

            <div class="setting-row">

                <label>

                    グリッド表示

                </label>

                <input
                    id="grid-visible"
                    type="checkbox"
                    checked>

            </div>

            <div class="setting-row">

                <label>

                    自動保存

                </label>

                <input
                    id="auto-save"
                    type="checkbox"
                    checked>

            </div>

            <menu>

                <button>

                    閉じる

                </button>

            </menu>

        </form>

    </dialog>

    <!-- ========================= -->
    <!-- Inside Editor -->
    <!-- ========================= -->

    <dialog id="inside-editor-dialog">

        <form method="dialog">

            <header class="dialog-header">

                <h2 id="inside-building-name">
                    校舎内部編集
                </h2>

            </header>

            <nav class="floor-tabs">

                <button
                    type="button"
                    class="floor-tab active"
                    data-floor="1">
                    1F
                </button>

                <button
                    type="button"
                    class="floor-tab"
                    data-floor="2">
                    2F
                </button>

                <button
                    type="button"
                    class="floor-tab"
                    data-floor="3">
                    3F
                </button>

                <button
                    type="button"
                    class="floor-tab"
                    data-floor="roof">
                    屋上
                </button>

            </nav>

            <section id="inside-editor-body">

                <aside id="inside-room-list">

                    <!-- script.js -->

                </aside>

                <div id="inside-canvas">

                    <div id="inside-grid"></div>

                    <div id="inside-object-layer"></div>

                    <div id="inside-selection-layer"></div>

                </div>

            </section>

            <menu class="dialog-buttons">

                <button
                    type="button"
                    id="inside-save">
                    保存
                </button>

                <button
                    value="cancel">
                    閉じる
                </button>

            </menu>

        </form>

    </dialog>

    <!-- ========================= -->
    <!-- Confirm Dialog -->
    <!-- ========================= -->

    <dialog id="confirm-dialog">

        <form method="dialog">

            <h2 id="confirm-title">

                確認

            </h2>

            <p id="confirm-message">

                本当に実行しますか？

            </p>

            <menu>

                <button value="cancel">

                    キャンセル

                </button>

                <button
                    id="confirm-ok"
                    value="default">

                    OK

                </button>

            </menu>

        </form>

    </dialog>

    <!-- ========================= -->
    <!-- About -->
    <!-- ========================= -->

    <dialog id="about-dialog">

        <form method="dialog">

            <h2>

                虹ケ丘学園
                Campus Map Builder

            </h2>

            <p>

                Version 1.0

            </p>

            <p>

                GitHub Pages Ready

            </p>

            <p>

                校内マップ作成ツール

            </p>

            <menu>

                <button>

                    閉じる

                </button>

            </menu>

        </form>

    </dialog>

    <!-- ========================= -->
    <!-- Hidden File Input -->
    <!-- ========================= -->

    <input
        id="json-loader"
        type="file"
        accept=".json"
        hidden>

    <!-- ========================= -->
    <!-- JavaScript -->
    <!-- ========================= -->

    <script src="script.js"></script>

    <script src="inside.js"></script>

</div>

</body>

</html>
