<!DOCTYPE html>
<html lang="ja">

<head>

    <!-- ====================================================== -->
    <!-- Meta -->
    <!-- ====================================================== -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="虹ケ丘学園 校内マップメーカー">

    <meta
        name="theme-color"
        content="#2563eb">

    <meta
        name="author"
        content="Mo²">

    <!-- ====================================================== -->
    <!-- Title -->
    <!-- ====================================================== -->

    <title>

        虹ケ丘学園 校内マップメーカー v1.0

    </title>

    <!-- ====================================================== -->
    <!-- CSS -->
    <!-- ====================================================== -->

    <link
        rel="stylesheet"
        href="style.css">

    <!-- ====================================================== -->
    <!-- html2canvas -->
    <!-- ====================================================== -->

    <script
        src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js">
    </script>

</head>

<body>

<div id="app">

        <!-- ====================================================== -->
    <!-- 【002】Header -->
    <!-- ====================================================== -->

    <header id="header">

        <div class="header-left">

            <img

                id="school-logo"

                src="assets/logo/nijigaoka.png"

                alt="虹ケ丘学園 校章">

            <div class="title-area">

                <h1>

                    虹ケ丘学園

                </h1>

                <p>

                    Campus Map Builder

                </p>

            </div>

        </div>

        <div class="header-right">

            <button

                id="new-map"

                class="header-button">

                新規

            </button>

            <button

                id="save-map"

                class="header-button">

                保存

            </button>

            <button

                id="load-map"

                class="header-button">

                読込

            </button>

            <button

                id="export-png"

                class="header-button">

                PNG保存

            </button>

            <button

                id="open-settings"

                class="header-button">

                設定

            </button>

        </div>

    </header>

        <!-- ====================================================== -->
    <!-- 【003】Toolbar -->
    <!-- ====================================================== -->

    <nav id="toolbar">

        <button

            id="undo"

            class="tool-button">

            ↶ Undo

        </button>

        <button

            id="redo"

            class="tool-button">

            ↷ Redo

        </button>

        <div class="toolbar-divider"></div>

        <button

            id="copy"

            class="tool-button">

            📄 コピー

        </button>

        <button

            id="paste"

            class="tool-button">

            📋 貼り付け

        </button>

        <button

            id="delete"

            class="tool-button">

            🗑 削除

        </button>

        <div class="toolbar-divider"></div>

        <button

            id="zoom-out"

            class="tool-button">

            －

        </button>

        <span id="zoom-label">

            100%

        </span>

        <button

            id="zoom-in"

            class="tool-button">

            ＋

        </button>

        <div class="toolbar-divider"></div>

        <button

            id="toggle-grid"

            class="tool-button">

            グリッド

        </button>

        <button

            id="toggle-inside"

            class="tool-button">

            校舎内部編集

        </button>

    </nav>

        <!-- ====================================================== -->
    <!-- 【004】Main Layout -->
    <!-- ====================================================== -->

    <main id="main-layout">

        <!-- =============================================== -->
        <!-- Left Sidebar -->
        <!-- =============================================== -->

        <aside id="sidebar-left">

            <div class="sidebar-tabs">

                <button

                    class="sidebar-tab active"

                    data-tab="building">

                    建物

                </button>

                <button

                    class="sidebar-tab"

                    data-tab="room">

                    教室

                </button>

                <button

                    class="sidebar-tab"

                    data-tab="furniture">

                    家具

                </button>

                <button

                    class="sidebar-tab"

                    data-tab="nature">

                    自然

                </button>

                <button

                    class="sidebar-tab"

                    data-tab="road">

                    道路

                </button>

                <button

                    class="sidebar-tab"

                    data-tab="favorite">

                    お気に入り

                </button>

            </div>

            <div id="sidebar-content">

                <div

                    id="building-list"

                    class="tool-category">

                </div>

                <div

                    id="room-list"

                    class="tool-category hidden">

                </div>

                <div

                    id="furniture-list"

                    class="tool-category hidden">

                </div>

                <div

                    id="nature-list"

                    class="tool-category hidden">

                </div>

                <div

                    id="road-list"

                    class="tool-category hidden">

                </div>

                <div

                    id="favorite-list"

                    class="tool-category hidden">

                </div>

            </div>

        </aside>

        <!-- =============================================== -->
        <!-- Canvas -->
        <!-- =============================================== -->

        <section id="canvas-wrapper">

            <div id="canvas-scroll">

                <div id="canvas">

                    <div id="grid-layer"></div>

                    <div id="guide-layer"></div>

                    <div id="object-layer"></div>

                    <div id="selection-layer"></div>

                    <div id="preview-layer"></div>

                </div>

            </div>

        </section>

        <!-- =============================================== -->
        <!-- Right Sidebar -->
        <!-- =============================================== -->

        <aside id="sidebar-right">

                        <!-- ========================= -->
            <!-- Layer -->
            <!-- ========================= -->

            <section class="panel">

                <div class="panel-header">

                    <h2>

                        レイヤー

                    </h2>

                </div>

                <div

                    id="layer-list"

                    class="panel-body">

                </div>

            </section>

            <!-- ========================= -->
            <!-- Property -->
            <!-- ========================= -->

            <section class="panel">

                <div class="panel-header">

                    <h2>

                        プロパティ

                    </h2>

                </div>

                <div

                    id="property-panel"

                    class="panel-body">

                    <div class="property-row">

                        <label>名前</label>

                        <input

                            id="property-name"

                            type="text">

                    </div>

                    <div class="property-row">

                        <label>種類</label>

                        <span id="property-type">

                            -

                        </span>

                    </div>

                    <div class="property-row">

                        <label>X</label>

                        <input

                            id="property-x"

                            type="number">

                    </div>

                    <div class="property-row">

                        <label>Y</label>

                        <input

                            id="property-y"

                            type="number">

                    </div>

                    <div class="property-row">

                        <label>幅</label>

                        <input

                            id="property-width"

                            type="number">

                    </div>

                    <div class="property-row">

                        <label>高さ</label>

                        <input

                            id="property-height"

                            type="number">

                    </div>

                    <div class="property-row">

                        <label>回転</label>

                        <input

                            id="property-rotate"

                            type="number">

                    </div>

                    <div class="property-row">

                        <label>透明度</label>

                        <input

                            id="property-opacity"

                            type="range"

                            min="0"

                            max="100"

                            value="100">

                    </div>

                </div>

            </section>

            <!-- ========================= -->
            <!-- History -->
            <!-- ========================= -->

            <section class="panel">

                <div class="panel-header">

                    <h2>

                        履歴

                    </h2>

                </div>

                <div

                    id="history-panel"

                    class="panel-body">

                </div>

            </section>

        </aside>

    </main>

        <!-- ====================================================== -->
    <!-- 【006】Status -->
    <!-- ====================================================== -->

    <footer id="status-bar">

        <span>

            Zoom :

            <span id="status-zoom">

                100%

            </span>

        </span>

        <span>

            X :

            <span id="status-x">

                0

            </span>

        </span>

        <span>

            Y :

            <span id="status-y">

                0

            </span>

        </span>

        <span>

            選択 :

            <span id="status-selected">

                0

            </span>

        </span>

        <span>

            保存 :

            <span id="status-save">

                新規

            </span>

        </span>

    </footer>

    <!-- ====================================================== -->
    <!-- Toast -->
    <!-- ====================================================== -->

    <div id="toast-container"></div>

    <!-- ====================================================== -->
    <!-- JSON Loader -->
    <!-- ====================================================== -->

    <input

        id="json-loader"

        type="file"

        accept=".json"

        hidden>

    <!-- ====================================================== -->
    <!-- Inside Editor -->
    <!-- ====================================================== -->

    <dialog id="inside-dialog">

        <h2>

            校舎内部編集

        </h2>

        <div id="inside-editor">

        </div>

        <form method="dialog">

            <button>

                閉じる

            </button>

        </form>

    </dialog>

    <!-- ====================================================== -->
    <!-- Setting -->
    <!-- ====================================================== -->

    <dialog id="setting-dialog">

        <h2>

            設定

        </h2>

        <form method="dialog">

            <button>

                閉じる

            </button>

        </form>

    </dialog>

    <!-- ====================================================== -->
    <!-- Script -->
    <!-- ====================================================== -->

    <script src="script.js"></script>

    <script src="inside.js"></script>

</div>

</body>

</html>
